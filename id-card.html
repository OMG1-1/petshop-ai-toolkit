<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物海报身份证</title>
    <style>
        /* 海报身份证设计 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9f7ff 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #ff9ecb 0%, #ffb9d6 100%);
            color: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(255, 155, 203, 0.2);
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header-icons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 10px;
            font-size: 1.5rem;
            color: white;
        }

        .card-design-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .design-selectors {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .design-selectors h3 {
            margin-bottom: 15px;
            color: #ff6eb4;
        }

        .selector-group {
            display: grid;
            gap: 10px;
        }

        select, button {
            padding: 12px;
            border: 2px solid #ffb9d6;
            border-radius: 10px;
            font-size: 1rem;
            background: white;
            transition: all 0.3s ease;
        }

        button {
            background: linear-gradient(135deg, #ff9ecb 0%, #ffb9d6 100%);
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 155, 203, 0.3);
        }

        /* 横版海报样式 */
        .horizontal-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(255, 155, 203, 0.2);
            border: 2px solid #ffb9d6;
            width: 800px;
            height: 400px;
            display: grid;
            grid-template-columns: 2fr 3fr;
            gap: 30px;
        }

        /* 竖版海报样式 */
        .vertical-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(255, 155, 203, 0.2);
            border: 2px solid #ffb9d6;
            width: 400px;
            height: 600px;
            display: grid;
            grid-template-rows: 2fr 3fr;
            gap: 30px;
        }

        /* 简约主题 */
        .minimal-theme {
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
            border: 2px solid #e0e0e0;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /* 可爱主题 */
        .cute-theme {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
            border: 2px solid #ffb9d6;
            box-shadow: 0 10px 30px rgba(255, 155, 203, 0.2);
        }

        /* 商务主题 */
        .business-theme {
            background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
            border: 2px solid #6ecbf5;
            box-shadow: 0 10px 20px rgba(108, **203, 245, 0.2);
        }

        /* 节日主题 */
        .festival-theme {
            background: linear-gradient(135deg, #ffffff 0%, #fff0f5 100%);
            border: 2px solid #ff9800;
            box-shadow: 0 10px 25px rgba(255, 152, 0, 0.2);
        }

        .photo-container {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #ffb9d6;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9ecb 0%, #ffb9d6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .info-section {
            display: grid;
            gap: 15px;
        }

        .info-item {
            display: grid;
            grid-template-columns: 1fr 2fr;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .info-value {
            font-weight: 700;
            color: #333;
            font-size: 1.1rem;
        }

        .title-section {
            margin-top: 20px;
            text-align: center;
        }

        .title-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ff6eb4;
            margin-bottom: 10px;
        }

        .qr-section {
            margin-top: 20px;
            text-align: center;
        }

        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: #f5f5f5;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 2px solid #ffb9d6;
            font-size: 1rem;
            color: #888;
        }

        .qr-text {
            margin-top: 10px;
            color: #666;
            font-size: 0.9rem;
        }

        .card-footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        /* 预览区域 */
        .preview-area {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        /* 下载按钮 */
        .download-area {
            margin-top: 30px;
            text-align: center;
        }

        .download-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff9ecb 0%, #ffb9d6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 155, 203, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 155, 203, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🐾 宠物海报身份证生成器</h1>
            <p class="subtitle">为宠物制作酷似海报的身份证，激发分享欲望</p>
            <div class="header-icons">
                <span>📸</span>
                <span>🎨</span>
                <span>📱</span>
                <span>💝</span>
            </div>
        </header>

        <div class="card-design-options">
            <h2>海报样式设计</h2>
            <div class="design-selectors">
                <div class="selector-group">
                    <h3>海报比例</h3>
                    <select id="card-layout">
                        <option value="horizontal">横版海报 (800×400)</option>
                        <option value="vertical">竖版海报 (400×600)</option>
                    </select>
                </div>
                
                <div class="selector-group">
                    <h3>主题风格</h3>
                    <select id="card-theme">
                        <option value="minimal">简约风格</option>
                        <option value="cute">可爱风格</option>
                        <option value="business">商务风格</option>
                        <option value="festival">节日风格</option>
                    </select>
                </div>
            </div>
            
            <button id="design-preview-btn">预览海报样式</button>
            <button id="design-generate-btn">生成海报身份证</button>
        </div>

        <div class="preview-area">
            <div id="card-preview" class="horizontal-card cute-theme">
                <div class="photo-container">
                    <div class="photo-placeholder">🐶 宠物照片</div>
                </div>
                
                <div class="info-section">
                    <div class="info-item">
                        <span class="info-label">宠物名:</span>
                        <span class="info-value" id="preview-pet-name">旺财</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">品种:</span>
                        <span class="info-value" id="preview-pet-type">狗狗</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">年龄:</span>
                        <span class="info-value" id="preview-pet-age">2岁</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">专属称号:</span>
                        <span class="info-value" id="preview-pet-title">小区第一干饭王</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">宠物店:</span>
                        <span class="info-value" id="preview-store-name">宠宠之家</span>
                    </div>
                    
                    <div class="title-section">
                        <div class="title-text">✨ 专属宠物证件 ✨</div>
                        <div class="qr-section">
                            <div class="qr-placeholder">扫码领优惠</div>
                            <div class="qr-text">专为宠宠之家顾客</div>
                        </div>
                    </div>
                    
                    <div class="card-footer">
                        <p>🪪 证件编号：PET2024-001</p>
                        <p>📅 创建日期：2024年3月30日</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="download-area">
            <button id="download-btn" class="download-btn">下载海报身份证</button>
        </div>
    </div>

    <script>
        // 宠物称号数据库
        const cuteTitles = {
            '狗': ['小区第一干饭王 🍖', '撒娇冠军 💕', '捡球达人 ⚽', '奔跑之王 🏃', '治愈天使 😇'],
            '猫': ['优雅女王 👑', '捕鼠能手 🐭', '傲娇公主 👸', '懒洋洋专家 😴', '美容大师 ✨'],
            '兔': ['蹦跳冠军 🏆', '胡萝卜爱好者 🥕', '温柔兔子 💝', '蹦迪高手 🎉'],
            '鸟': ['歌唱大师 🎤', '飞翔高手 🌬️', '羽毛美人 🪶'],
            '鱼': ['游泳冠军 🏊', '潜水高手 🏝️', '悠闲鱼儿 😌']
        };

        // 海报样式管理
        function updatePreview() {
            const layout = document.getElementById('card-layout').value;
            const theme = document.getElementById('card-theme').value;
            const preview = document.getElementById('card-preview');
            
            // 更新布局
            preview.className = `${layout}-card ${theme}-theme`;
            
            // 更新样式
            updateCardTheme(theme);
        }

        function updateCardTheme(theme) {
            const preview = document.getElementById('card-preview');
            
            // 主题色
            const themes = {
                'minimal': { borderColor: '#e0e0e0', titleColor: '#333' },
                'cute': { borderColor: '#ffb9d6', titleColor: '#ff6eb4' },
                'business': { borderColor: '#6ecbf5', titleColor: '#0596e4' },
                'festival': { borderColor: '#ff9800', titleColor: '#ff6eb4' }
            };
            
            const themeConfig = themes[theme];
            
            // 更新标题颜色
            preview.querySelector('.title-text').style.color = themeConfig.titleColor;
            
            // 更新边框颜色
            preview.style.borderColor = themeConfig.borderColor;
            preview.querySelector('.qr-placeholder').style.borderColor = themeConfig.borderColor;
            preview.querySelector('.photo-placeholder').style.borderColor = themeConfig.borderColor;
        }

        // 生成宠物称号
        function generatePetTitle(petType) {
            const titles = cuteTitles[petType] || ['可爱宠物 🐾'];
            return titles[Math.floor(Math.random() * titles.length)];
        }

        // 预览海报样式
        document.getElementById('design-preview-btn').addEventListener('click', updatePreview);
        
        // 生成海报身份证
        document.getElementById('design-generate-btn').addEventListener('click', function() {
            updatePreview();
            
            // 随机生成称号
            const petType = document.getElementById('preview-pet-type').textContent;
            const title = generatePetTitle(petType);
            document.getElementById('preview-pet-title').textContent = title;
            
            // 添加动画效果
            const preview = document.getElementById('card-preview');
            preview.style.transform = 'scale(1.05)';
            preview.style.boxShadow = '0 20px 50px rgba(255, 155, 203, 0.3)';
            
            setTimeout(() => {
                preview.style.transform = 'scale(1)';
            }, 500);
            
            alert('海报身份证生成成功！🎉');
        });

        // 下载按钮
        document.getElementById('download-btn').addEventListener('click', function() {
            alert('海报身份证下载功能即将实现！📥');
        });

        // 初始化
        updatePreview();
    </script>
</body>
</html>
